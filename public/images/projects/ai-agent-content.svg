<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="50%" stop-color="#1a0b2e"/>
      <stop offset="100%" stop-color="#2d0a4e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8"/></filter>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>

  <circle cx="200" cy="180" r="280" fill="url(#orb1)"/>
  <circle cx="1100" cy="650" r="320" fill="url(#orb2)"/>

  <g opacity="0.08" stroke="#a855f7" stroke-width="1" fill="none">
    <path d="M0,200 L1280,200 M0,400 L1280,400 M0,600 L1280,600"/>
    <path d="M320,0 L320,800 M640,0 L640,800 M960,0 L960,800"/>
  </g>

  <g transform="translate(40,32)">
    <rect width="1200" height="60" rx="12" fill="#ffffff10" stroke="#ffffff20"/>
    <circle cx="24" cy="30" r="6" fill="#ff5f57"/>
    <circle cx="48" cy="30" r="6" fill="#febc2e"/>
    <circle cx="72" cy="30" r="6" fill="#28c840"/>
    <rect x="120" y="18" width="900" height="24" rx="12" fill="#ffffff10"/>
    <text x="140" y="35" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#9ca3af">al-agent-content.vercel.app</text>
  </g>

  <g transform="translate(640,360)" text-anchor="middle" font-family="-apple-system, Inter, sans-serif">
    <text y="-90" font-size="28" font-weight="500" fill="#a855f7" letter-spacing="6">AI · AUTOMATION</text>
    <text y="0" font-size="110" font-weight="800" fill="#ffffff" letter-spacing="-3">AI Agent Content</text>
    <text y="60" font-size="24" font-weight="400" fill="#cbd5e1">Sinh content thông minh bằng AI agent</text>

    <g transform="translate(0,130)" font-size="16" font-weight="500" fill="#ffffff">
      <g transform="translate(-340,0)">
        <rect x="0" y="0" width="120" height="40" rx="20" fill="#ffffff15" stroke="#a855f7" stroke-width="1"/>
        <text x="60" y="26" text-anchor="middle">Next.js</text>
      </g>
      <g transform="translate(-200,0)">
        <rect x="0" y="0" width="140" height="40" rx="20" fill="#ffffff15" stroke="#a855f7" stroke-width="1"/>
        <text x="70" y="26" text-anchor="middle">TypeScript</text>
      </g>
      <g transform="translate(-40,0)">
        <rect x="0" y="0" width="120" height="40" rx="20" fill="#ffffff15" stroke="#a855f7" stroke-width="1"/>
        <text x="60" y="26" text-anchor="middle">Tailwind</text>
      </g>
      <g transform="translate(120,0)">
        <rect x="0" y="0" width="180" height="40" rx="20" fill="#ffffff15" stroke="#ec4899" stroke-width="1"/>
        <text x="90" y="26" text-anchor="middle">Claude API</text>
      </g>
    </g>
  </g>

  <g transform="translate(640,720)" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" fill="#64748b" font-size="14">
    <text>github.com/HuaThinhHung/Al-Agent-Content</text>
  </g>
</svg>
